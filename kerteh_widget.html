<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kerteh Sensor Widget</title>
  <style>
    body { margin: 0; padding: 0; background: transparent; }
  </style>
</head>
<body>

<div style="font-family:Arial,sans-serif; font-size:12px; border-radius:8px; overflow:hidden; border:1px solid #1a5c38;">
  <div style="background:#e8f5ee; padding:10px 12px;">
    <div style="display:flex; align-items:center; gap:16px;">
      <div style="display:flex; align-items:center; gap:6px;">
        <span style="font-size:11px; color:#555;">Pressure</span>
        <span id="live-bar" style="font-size:22px; font-weight:700; color:#1a5c38;">6.2 bar</span>
        <span style="background:#d4edda; color:#1a5c38; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:700;">Normal</span>
      </div>
      <div style="width:1px; height:28px; background:#b2d8c2;"></div>
      <div style="display:flex; align-items:center; gap:6px;">
        <span style="font-size:11px; color:#555;">Wind</span>
        <span id="live-wind" style="font-size:22px; font-weight:700; color:#1a5c38;">142 m³/h</span>
      </div>
      <div style="width:1px; height:28px; background:#b2d8c2;"></div>
      <div style="display:flex; align-items:center; gap:6px;">
        <span style="font-size:11px; color:#555;">Temp</span>
        <span id="live-suhu" style="font-size:22px; font-weight:700; color:#1a5c38;">28.4°C</span>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  function randomTemp() {
    return (28 + Math.random() * 7).toFixed(1) + '°C';
  }
  function randomBar() {
    return (5 + Math.random() * 5).toFixed(1) + ' bar';
  }
  function randomWind() {
    return Math.floor(130 + Math.random() * 30) + ' m³/h';
  }
  function updateAll() {
    document.getElementById('live-suhu').textContent = randomTemp();
    document.getElementById('live-bar').textContent = randomBar();
    document.getElementById('live-wind').textContent = randomWind();
  }
  updateAll();
  setInterval(updateAll, 5000);
</script>

</body>
</html>
