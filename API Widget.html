<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kerteh Sensor Widget</title>
  <style>
    body { margin: 0; padding: 0; background: transparent; }
  </style>
</head>
<body>

<div style="display:inline-block; border-radius:0px; overflow:hidden; border:1px solid #1a5c38; font-family:Arial,sans-serif; min-width:280px;">
  <div style="background:#1a5c38; padding:12px 10px;">
  </div>
  <div style="background:#e8f5ee; padding:4px 10px;">

    <div style="display:flex; align-items:center; padding:5px 0; border-bottom:1px solid #c2dece;">
      <span style="font-size:11px; color:#555; width:100px;">Pressure</span>
      <span id="live-bar-num" style="font-size:16px; font-weight:700; color:#1a5c38; width:45px; text-align:right;">6.2</span>
      <span style="font-size:11px; color:#1a5c38; margin-left:4px; width:30px;">bar</span>
      <span style="background:#d4edda; color:#1a5c38; font-size:9px; padding:1px 5px; border-radius:0px; font-weight:700; margin-left:6px;">Normal</span>
    </div>

    <div style="display:flex; align-items:center; padding:5px 0; border-bottom:1px solid #c2dece;">
      <span style="font-size:11px; color:#555; width:100px;">Wind</span>
      <span id="live-wind-num" style="font-size:16px; font-weight:700; color:#1a5c38; width:45px; text-align:right;">142</span>
      <span style="font-size:11px; color:#1a5c38; margin-left:4px; width:30px;">m³/h</span>
    </div>

    <div style="display:flex; align-items:center; padding:5px 0;">
      <span style="font-size:11px; color:#555; width:100px;">Temperature</span>
      <span id="live-suhu-num" style="font-size:16px; font-weight:700; color:#1a5c38; width:45px; text-align:right;">28.4</span>
      <span style="font-size:11px; color:#1a5c38; margin-left:4px; width:30px;">°C</span>
    </div>

  </div>
</div>

<script type="text/javascript">
  function randomTemp() { return (28 + Math.random() * 7).toFixed(1); }
  function randomBar() { return (5 + Math.random() * 5).toFixed(1); }
  function randomWind() { return Math.floor(130 + Math.random() * 30); }
  function updateAll() {
    document.getElementById('live-suhu-num').textContent = randomTemp();
    document.getElementById('live-bar-num').textContent = randomBar();
    document.getElementById('live-wind-num').textContent = randomWind();
  }
  updateAll();
  setInterval(updateAll, 5000);
</script>

</body>
</html>
